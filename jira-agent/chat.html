<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --surface2: #eef0f6;
      --border: #dde1ee;
      --text: #1a1d2e;
      --text-muted: #8a90a8;
      --user-bg: #2563eb;
      --user-text: #ffffff;
      --agent-bg: #f0f2fa;
      --agent-text: #1a1d2e;
      --error-bg: #fff0f0;
      --error-text: #dc2626;
      --accent: #2563eb;
      --input-bg: #ffffff;
      --scrollbar: #dde1ee;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    header p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .btn-clear {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-clear:hover {
      background: var(--surface2);
      color: var(--text);
      border-color: #4a5080;
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user  { flex-direction: row-reverse; }
    .msg-row.agent { flex-direction: row; }
    .msg-row.other { flex-direction: row; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .msg-row.user  .avatar { background: #2563eb; color: #fff; }
    .msg-row.agent .avatar { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .msg-row.other .avatar { background: #7c3aed; color: #fff; }

    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 72%;
      gap: 3px;
    }

    .msg-row.user  .bubble-wrap { align-items: flex-end; }
    .msg-row.agent .bubble-wrap { align-items: flex-start; }
    .msg-row.other .bubble-wrap { align-items: flex-start; }

    .speaker-name {
      font-size: 11px;
      font-weight: 600;
      padding: 0 4px;
    }
    .msg-row.user  .speaker-name { color: #1d4ed8; }
    .msg-row.other .speaker-name { color: #6d28d9; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .msg-row.user  .bubble {
      background: #2563eb;
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    .msg-row.agent .bubble {
      background: var(--agent-bg);
      color: var(--agent-text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-row.other .bubble {
      background: #ede9fe;
      color: #2e1065;
      border: 1px solid #c4b5fd;
      border-bottom-left-radius: 4px;
    }

    .bubble.error {
      background: var(--error-bg);
      color: var(--error-text);
      border-color: #fecaca;
    }

    /* Markdown inside agent bubbles */
    .bubble h1, .bubble h2, .bubble h3 {
      margin: 10px 0 6px;
      font-weight: 600;
      line-height: 1.3;
    }
    .bubble h1 { font-size: 17px; }
    .bubble h2 { font-size: 15px; }
    .bubble h3 { font-size: 14px; }
    .bubble p  { margin: 4px 0; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 4px 0; }
    .bubble li { margin: 2px 0; }
    .bubble code {
      background: #e8eaf2;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13px;
    }
    .bubble pre {
      background: #e8eaf2;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code { background: none; border: none; padding: 0; }
    .bubble strong { font-weight: 600; }
    .bubble em     { font-style: italic; }
    .bubble a      { color: var(--accent); text-decoration: underline; }
    .bubble blockquote {
      border-left: 3px solid var(--border);
      padding-left: 10px;
      color: var(--text-muted);
      margin: 6px 0;
    }
    .bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    .bubble table { border-collapse: collapse; width: 100%; margin: 6px 0; font-size: 13px; }
    .bubble th, .bubble td { border: 1px solid var(--border); padding: 6px 10px; }
    .bubble th { background: var(--surface); }

    .timestamp {
      font-size: 11px;
      color: var(--text-muted);
      padding: 0 4px;
    }

    /* ── Typing indicator ── */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Empty state ── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      pointer-events: none;
      user-select: none;
    }

    #empty-state .empty-icon {
      font-size: 42px;
      opacity: 0.4;
    }

    #empty-state p {
      font-size: 14px;
      text-align: center;
      max-width: 260px;
      line-height: 1.5;
    }

    /* ── Input area ── */
    .input-area {
      padding: 14px 20px 18px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px 8px 8px 14px;
      transition: border-color 0.15s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      font-family: inherit;
    }

    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover   { background: #1d4ed8; }
    #send-btn:active  { transform: scale(0.94); }
    #send-btn:disabled { background: #c8cdd8; cursor: not-allowed; opacity: 0.6; }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      padding-left: 4px;
    }

    .mention {
      color: #ffffff;
      font-weight: 700;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-icon">🤖</div>
    <div>
      <h1>Agent Chat</h1>
      <p>Conversation history preserved per session</p>
    </div>
  </div>
  <button class="btn-clear" id="clear-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
    </svg>
    Clear chat
  </button>
</header>

<div id="messages">
  <div id="empty-state">
    <div class="empty-icon">💬</div>
    <p>Ghi lại hội thoại, rồi tag <strong style="color:var(--accent)">@agent</strong> để tạo Jira ticket.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Nhập hội thoại... dùng @agent để gọi AI"
    ></textarea>
    <button id="send-btn" type="button" title="Send (Enter)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">Enter to send · Shift+Enter for new line · <span style="color:var(--accent)">@agent</span> để gọi AI</div>
</div>

<script>
  const ENDPOINT  = '/api/chat';
  const LS_KEY    = 'jira-agent-chat-history';
  const LS_TS_KEY = 'jira-agent-last-activity';
  const EXPIRE_MS = 30 * 60 * 1000;
  const MAX_TURNS = 20;

  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const clearBtn    = document.getElementById('clear-btn');
  const emptyState  = document.getElementById('empty-state');

  // ── Marked config ──────────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  // ── Session state ──────────────────────────────────────────────
  let history = []; // { role: 'user'|'assistant', content: string }

  // ── LocalStorage helpers ───────────────────────────────────────
  function saveHistory() {
    localStorage.setItem(LS_KEY, JSON.stringify(history));
    localStorage.setItem(LS_TS_KEY, String(Date.now()));
  }

  function loadHistory() {
    try {
      const lastTs = parseInt(localStorage.getItem(LS_TS_KEY) || '0', 10);
      if (Date.now() - lastTs > EXPIRE_MS) {
        clearStorage();
        return [];
      }
      return JSON.parse(localStorage.getItem(LS_KEY) || '[]');
    } catch {
      return [];
    }
  }

  function clearStorage() {
    localStorage.removeItem(LS_KEY);
    localStorage.removeItem(LS_TS_KEY);
  }

  // ── Timestamp formatter ────────────────────────────────────────
  function formatTime(date) {
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  // ── Parse speaker prefix from content ─────────────────────────
  const SPEAKERS = {
    'PO':          { side: 'user',  avatar: 'PO' },
    'Stakeholder': { side: 'other', avatar: 'SH' },
  };

  function parseSpeaker(content) {
    for (const name of Object.keys(SPEAKERS)) {
      if (content.startsWith(name + ':\n')) {
        return { speaker: name, body: content.slice(name.length + 2) };
      }
    }
    return { speaker: null, body: content };
  }

  // ── Render a single message bubble ────────────────────────────
  function renderMessage({ role, content, isError = false, time }) {
    const { speaker, body } = role === 'user' ? parseSpeaker(content) : { speaker: null, body: content };
    const info = speaker ? SPEAKERS[speaker] : null;
    const side = role === 'assistant' ? 'agent' : (info ? info.side : 'user');

    const row = document.createElement('div');
    row.className = `msg-row ${side}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'assistant' ? '🤖' : (info ? info.avatar : 'U');

    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';

    // Speaker name label
    if (speaker) {
      const nameEl = document.createElement('div');
      nameEl.className = 'speaker-name';
      nameEl.textContent = speaker;
      wrap.appendChild(nameEl);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (isError ? ' error' : '');

    if (role === 'assistant') {
      bubble.innerHTML = marked.parse(body);
    } else {
      const escaped = body.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      bubble.innerHTML = escaped.replace(/@agent\b/gi, '<span class="mention">@agent</span>');
    }

    const ts = document.createElement('div');
    ts.className = 'timestamp';
    ts.textContent = formatTime(time || new Date());

    wrap.appendChild(bubble);
    wrap.appendChild(ts);

    if (side === 'user') {
      row.appendChild(wrap);
      row.appendChild(avatar);
    } else {
      row.appendChild(avatar);
      row.appendChild(wrap);
    }

    return row;
  }

  // ── Typing indicator ───────────────────────────────────────────
  function showTyping() {
    const row  = document.createElement('div');
    row.className = 'msg-row agent';
    row.id = 'typing-indicator';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';

    const wrap   = document.createElement('div');
    wrap.className = 'bubble-wrap';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    wrap.appendChild(bubble);
    row.appendChild(avatar);
    row.appendChild(wrap);
    messagesEl.appendChild(row);
    scrollDown();
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  // ── Scroll to bottom ───────────────────────────────────────────
  function scrollDown() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Toggle empty state ─────────────────────────────────────────
  function syncEmptyState() {
    emptyState.style.display = history.length === 0 ? 'flex' : 'none';
  }

  // ── Build context string for the API call ─────────────────────
  // Called AFTER addMessage, so history already includes userText as the last item.
  // We use history[:-1] as prior context and append userText as the final turn.
  function buildMessagePayload(userText) {
    const all = history.slice(-(MAX_TURNS * 2 + 1));
    const priorTurns = all.slice(0, -1); // everything except the just-added message
    if (priorTurns.length === 0) return userText;
    const lines = priorTurns.map(m =>
      `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.content}`
    ).join('\n');
    return `[Previous conversation]\n${lines}\n[End of history]\n\nUser: ${userText}`;
  }

  // ── Append message to DOM + history ───────────────────────────
  function addMessage(role, content, isError = false) {
    const time = new Date();

    // push to history only non-error, real messages
    if (!isError) {
      history.push({ role, content });
      saveHistory();
    }

    syncEmptyState();
    const node = renderMessage({ role, content, isError, time });
    messagesEl.appendChild(node);
    scrollDown();
  }

  // ── Send ───────────────────────────────────────────────────────
  let _sending = false;
  async function sendMessage() {
    if (_sending) return;
    const text = inputEl.value.trim();
    if (!text) return;

    _sending = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    // Always display + save the message first
    addMessage('user', text);

    // Call endpoint if: message has @agent OR agent has already replied (ongoing conversation)
    const agentHasReplied = history.some(m => m.role === 'assistant');
    if (!/@agent\b/i.test(text) && !agentHasReplied) {
      sendBtn.disabled = false;
      inputEl.focus();
      return;
    }

    // Build payload after addMessage (history already has current msg)
    const payload = buildMessagePayload(text);
    showTyping();

    try {
      const res  = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: payload }),
      });

      const data = await res.json();
      hideTyping();

      if (data.status !== 'success') {
        const errMsg = data.response || data.error || `Server returned status: ${data.status}`;
        addMessage('assistant', `⚠️ ${errMsg}`, true);
      } else {
        addMessage('assistant', data.response);
      }
    } catch (err) {
      hideTyping();
      addMessage('assistant', `⚠️ Failed to reach the agent: ${err.message}`, true);
    } finally {
      _sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ── Clear ──────────────────────────────────────────────────────
  function clearChat() {
    history = [];
    clearStorage();
    // remove all message rows (keep empty-state div)
    [...messagesEl.children].forEach(el => {
      if (el.id !== 'empty-state') el.remove();
    });
    syncEmptyState();
  }

  // ── Restore history from localStorage on load ─────────────────
  function restoreHistory() {
    const saved = loadHistory();
    if (!saved.length) return;

    history = saved;
    syncEmptyState();

    history.forEach(({ role, content }) => {
      const node = renderMessage({ role, content, isError: false, time: new Date() });
      messagesEl.appendChild(node);
    });
    scrollDown();
  }

  // ── Auto-expire check (runs every minute) ─────────────────────
  setInterval(() => {
    const lastTs = parseInt(localStorage.getItem(LS_TS_KEY) || '0', 10);
    if (history.length && Date.now() - lastTs > EXPIRE_MS) {
      clearChat();
    }
  }, 60_000);

  // ── Auto-resize textarea ───────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // ── Keyboard: Enter sends, Shift+Enter newline ─────────────────
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);
  clearBtn.addEventListener('click', clearChat);

  // ── Sample conversation ────────────────────────────────────────
  const SAMPLE = [
    `Stakeholder:\nChúng ta cần thêm tính năng xuất báo cáo doanh thu theo tháng ra file Excel. Người dùng finance hay yêu cầu cái này lắm.`,
    `PO:\nOk, cụ thể họ cần các cột nào? Và filter theo khoảng thời gian hay theo từng tháng cố định?`,
    `Stakeholder:\nCần có: ngày, mã đơn hàng, khách hàng, tổng tiền, trạng thái. Filter theo date range. Priority cao vì Q4 report sắp đến rồi.`,
    `PO:\nRõ rồi. Sprint này có thể nhét vào không, estimate tầm 5 SP.`,
  ];

  function loadSample() {
    SAMPLE.forEach(content => {
      history.push({ role: 'user', content });
      const node = renderMessage({ role: 'user', content, isError: false, time: new Date() });
      messagesEl.appendChild(node);
    });
    saveHistory();
    syncEmptyState();
    scrollDown();
  }

  // ── Init ───────────────────────────────────────────────────────
  restoreHistory();
  if (history.length === 0) loadSample();
  syncEmptyState();
  inputEl.focus();
</script>
</body>
</html>
